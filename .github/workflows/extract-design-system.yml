name: Extrair Design System Completo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  # Job 1: lê o sites.txt e monta a lista dinâmica
  preparar:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.ler-sites.outputs.sites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ler sites.txt
        id: ler-sites
        run: |
          # Remove linhas em branco e comentários (#), gera JSON array
          SITES=$(grep -v '^\s*#' sites.txt | grep -v '^\s*$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=$SITES" >> $GITHUB_OUTPUT
          echo "Sites encontrados: $SITES"

  # Job 2: roda em paralelo para cada site
  extrair:
    needs: preparar
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.preparar.outputs.sites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        run: |
          npm install -g dembrandt
          cd extractor && npm install
          npx playwright install chromium firefox

      - name: Extrair tokens (dembrandt)
        run: |
          echo "→ dembrandt em ${{ matrix.site }}"
          npx dembrandt ${{ matrix.site }} \
            --save-output \
            --no-sandbox \
            --browser=firefox \
            --slow || true

      - name: Extrair interacoes (Playwright stealth)
        run: |
          echo "→ interaction-extractor em ${{ matrix.site }}"
          mkdir -p output/${{ matrix.site }}
          node extractor/interaction-extractor.js \
            "https://${{ matrix.site }}" \
            "output" || true

      - name: Combinar em Markdown
        run: |
          node extractor/combine-reports.js \
            "output/${{ matrix.site }}" || true

      - name: Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: design-system-${{ matrix.site }}
          path: output/${{ matrix.site }}/
          retention-days: 30
          if-no-files-found: warn
