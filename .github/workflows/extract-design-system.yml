name: Extrair Design System Completo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Sites a extrair (separados por vírgula, ou "todos")'
        required: true
        default: 'todos'

jobs:
  extrair:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        site:
          - stripe.com
          - neofin.com.br
          - stone.com.br
          - abacatepay.com
          - nubank.com.br
          - mercadopago.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        run: |
          npm install -g dembrandt
          cd extractor && npm install
          npx playwright install chromium firefox

      - name: Extrair tokens de design (dembrandt)
        run: |
          npx dembrandt ${{ matrix.site }} \
            --save-output \
            --no-sandbox \
            --browser=firefox \
            --slow || true

      - name: Extrair padroes de interacao (Playwright)
        run: |
          mkdir -p output/${{ matrix.site }}
          node extractor/interaction-extractor.js \
            "https://${{ matrix.site }}" \
            "output" || true

      - name: Combinar em Markdown
        run: |
          node extractor/combine-reports.js \
            "output/${{ matrix.site }}" || true

      - name: Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: design-system-${{ matrix.site }}
          path: output/${{ matrix.site }}/
          retention-days: 30
          if-no-files-found: warn
